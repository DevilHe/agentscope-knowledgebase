services:
  mysql:
    image: mysql:8.0
    container_name: askb-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: rag_standards
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: askb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: askb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: askb-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  ollama_data:
