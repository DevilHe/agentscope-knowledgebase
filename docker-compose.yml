services:
  mysql:
    image: mysql:8.0
    container_name: askb-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: rag_standards
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 200M

  redis:
    image: redis:7-alpine
    container_name: askb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 64M

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: askb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 180M

  ollama:
    image: ollama/ollama:latest
    container_name: askb-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  backend:
    build: ./backend
    container_name: askb-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://ollama:11434
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 400M

  frontend:
    build:
      context: ./frontend
      args:
        VITE_PASSWORD_ENCRYPT_KEY: ${VITE_PASSWORD_ENCRYPT_KEY}
        VITE_REGISTRATION_ENABLED: ${VITE_REGISTRATION_ENABLED:-false}
        VITE_ICP_BEIAN: ${VITE_ICP_BEIAN:-}
    container_name: askb-frontend
    restart: unless-stopped
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  ollama_data:
  uploads_data:
